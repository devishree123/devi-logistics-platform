
name: Deploy AI Logistics Platform to GKE

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ai-logistics-platform
      GAR_LOCATION: asia-south1
      REPOSITORY: ai-repo
      CLUSTER_NAME: logistics-cluster
      CLUSTER_ZONE: asia-south1-a

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/280714936496/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deployer@ai-logistics-platform.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t asia-south1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/ai-backend:$IMAGE_TAG .

      - name: Push Docker image
        run: |
          docker push asia-south1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/ai-backend:$IMAGE_TAG

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials $CLUSTER_NAME --zone $CLUSTER_ZONE

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/ai-backend \
          ai-backend=asia-south1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/ai-backend:$IMAGE_TAG

          kubectl rollout status deployment/ai-backend
