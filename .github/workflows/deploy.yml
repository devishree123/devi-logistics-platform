name: Deploy AI Logistics Platform to GKE

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # REQUIRED for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/280714936496/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deployer@ai-logistics-platform.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build -t gcr.io/ai-logistics-platform/ai-backend:latest .

      - name: Push Docker image
        run: |
          docker push gcr.io/ai-logistics-platform/ai-backend:latest

      - name: Deploy to GKE
        run: |
          gcloud container clusters get-credentials YOUR_CLUSTER_NAME --region asia-south1
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
